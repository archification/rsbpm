<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>rsbpm editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: monospace; font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #top { display: flex; gap: 8px; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
  #top label { color: #aaa; }
  #top input[type=number], #top input[type=text] { background: #222; color: #eee; border: 1px solid #444; padding: 3px 6px; width: 70px; }
  #top input[type=range] { width: 80px; }
  button { background: #333; color: #eee; border: 1px solid #555; padding: 4px 10px; cursor: pointer; }
  button:hover { background: #444; }
  button.active { background: #555; border-color: #888; }
  .sep { width: 1px; background: #444; align-self: stretch; margin: 0 4px; }
  select { background: #222; color: #eee; border: 1px solid #444; padding: 3px; }

  #middle { display: flex; flex: 1; overflow: hidden; }
  #preview-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; }
  #preview-wrap video { max-width: 100%; max-height: 100%; display: block; }
  #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

  #sidebar { width: 220px; background: #181818; border-left: 1px solid #333; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
  .section { border: 1px solid #333; padding: 8px; }
  .section h3 { color: #aaa; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 4px; }
  .row label { color: #ccc; white-space: nowrap; flex-shrink: 0; }
  .row input[type=number], .row input[type=range] { flex: 1; min-width: 0; }
  .row input[type=number] { background: #222; color: #eee; border: 1px solid #444; padding: 2px 4px; }
  .color-swatch { width: 22px; height: 22px; border: 2px solid #555; cursor: pointer; border-radius: 3px; flex-shrink: 0; }
  .color-picker-wrap { position: relative; }

  #bottom { background: #151515; border-top: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
  #timeline-scroll { overflow-x: auto; overflow-y: hidden; }
  #timeline-inner { position: relative; }
  #timeline-canvas { position: absolute; top: 0; left: 0; cursor: pointer; }
  #playhead-row { position: relative; height: 6px; background: #111; }

  .color-palette { display: flex; gap: 4px; flex-wrap: wrap; }
  .color-option { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .color-option.selected { border-color: white; }

  #render-btn { background: #2a5a2a; border-color: #4a9a4a; }
  #render-btn:hover { background: #3a7a3a; }
  #status { color: #888; font-size: 11px; }
  input[type=checkbox] { accent-color: #aaa; cursor: pointer; }
  .fx-val { min-width: 28px; text-align: right; font-size: 11px; color: #999; flex-shrink: 0; }
</style>
</head>
<body>

<div id="top">
  <button id="load-video-btn">Load Video</button>
  <input id="video-file" type="file" accept="video/mp4,video/*" style="display:none">
  <button id="load-audio-btn">Load Metro Audio</button>
  <input id="audio-file" type="file" accept="audio/*" style="display:none">
  <div class="sep"></div>
  <label>BPM <input id="bpm" type="number" value="120" min="1" max="300" step="0.01" style="width:70px"></label>
  <button id="id-song-btn" title="Send ~10s of audio near the playhead to audd.io to identify the song">ID Song</button>
  <label>Output <input id="output-path" type="text" value="output.mp4" style="width:140px"></label>
  <div class="sep"></div>
  <button id="play-btn">&#9654; Play</button>
  <label>Vol <input id="volume" type="range" min="0" max="1" step="0.01" value="0.4" style="width:70px"></label>
  <label>Time: <span id="time-display">0.00</span>s</label>
  <div class="sep"></div>
  <button id="fill-beats-btn">Fill Beats</button>
  <button id="clear-dots-btn">Clear All</button>
  <div class="sep"></div>
  <button id="render-btn">&#9654; Render</button>
  <label title="Render only the animated bar overlay with a transparent background (ProRes 4444). Use this to composite in Kdenlive without re-encoding the source video."><input type="checkbox" id="overlay-only-cb"> Overlay only</label>
  <span id="status"></span>
</div>

<div id="middle">
  <div id="preview-wrap">
    <video id="video" preload="auto"></video>
    <canvas id="overlay-canvas"></canvas>
  </div>

  <div id="sidebar">
    <div class="section">
      <h3>Bar</h3>
      <div class="row"><label>Y pos</label><input type="range" id="bar-y" min="0" max="1" step="0.01" value="0.98"><span id="bar-y-val">0.98</span></div>
      <div class="row"><label>Height</label><input type="number" id="bar-height" value="60" min="10" max="300"></div>
      <div class="row"><label>BG opacity</label><input type="range" id="bar-opacity" min="0" max="255" value="35"><span id="bar-opacity-val">35</span></div>
    </div>

    <div class="section">
      <h3>Dots</h3>
      <div class="row"><label>Color</label></div>
      <div class="color-palette" id="dot-color-palette"></div>
      <div class="row" style="margin-top:6px"><label>Radius</label><input type="number" id="dot-radius" value="14" min="2" max="60"></div>
      <div class="row"><label>Travel (s)</label><input type="number" id="dot-travel" value="3" min="0.1" max="10" step="0.1"></div>
    </div>

    <div class="section">
      <h3>End Circle</h3>
      <div class="row"><label>Color</label></div>
      <div class="color-palette" id="end-color-palette"></div>
      <div class="row" style="margin-top:6px"><label>X pos</label><input type="range" id="end-x" min="0" max="1" step="0.01" value="0.50"><span id="end-x-val">0.50</span></div>
      <div class="row"><label>Radius</label><input type="number" id="end-radius" value="22" min="4" max="100"></div>
    </div>

    <div class="section">
      <h3>Direction</h3>
      <div class="row">
        <button id="dir-ltr">L → R</button>
        <button id="dir-rtl">R → L</button>
        <button id="dir-both" class="active">L ↔ R</button>
      </div>
    </div>

    <div class="section">
      <h3>Effects</h3>
      <div class="row"><label><input type="checkbox" id="fx-speedup" checked> Speed-up</label><input type="range" id="fx-speedup-power" min="1" max="5" step="0.1" value="2.5" title="Acceleration power (1=linear)"><span class="fx-val" id="fx-speedup-val">2.5</span></div>
      <div class="row"><label><input type="checkbox" id="fx-hitglow" checked> Hit Glow</label><input type="range" id="fx-hitglow-dur" min="0.05" max="0.6" step="0.01" value="0.25" title="Glow duration (s)"><span class="fx-val" id="fx-hitglow-val">.25s</span></div>
      <div class="row"><label><input type="checkbox" id="fx-shrink" checked> Shrink</label><input type="range" id="fx-shrink-dur" min="0.03" max="0.3" step="0.01" value="0.12" title="Shrink duration (s)"><span class="fx-val" id="fx-shrink-val">.12s</span></div>
      <div class="row"><label><input type="checkbox" id="fx-dotglow" checked> Dot Glow</label><input type="range" id="fx-dotglow-int" min="0" max="1" step="0.05" value="0.7" title="Glow intensity"><span class="fx-val" id="fx-dotglow-val">0.70</span></div>
      <div class="row"><label><input type="checkbox" id="fx-echoring"> Echo Ring</label><input type="range" id="fx-echoring-dur" min="0.1" max="1.0" step="0.01" value="0.4" title="Ring duration (s)"><span class="fx-val" id="fx-echoring-val">.40s</span></div>
    </div>

    <div class="section">
      <h3>Beat Changes</h3>
      <div style="font-size:10px;color:#777;margin-bottom:6px">Select · click dot track to place · right-click to remove</div>
      <div id="beat-change-palette" style="display:grid;grid-template-columns:1fr 1fr;gap:4px"></div>
      <div id="bc-normal-bpm-row" class="row" style="display:none;margin-top:6px">
        <label>New BPM</label>
        <input type="number" id="bc-normal-bpm" value="120" min="1" max="999" step="0.01" style="width:70px">
      </div>
      <div id="bc-downbeat-row" style="display:none;margin-top:4px">
        <button id="bc-downbeat-btn" style="width:100%" title="Place a normal beat change at the current playhead, resetting the downbeat phase">↓ Downbeat Here</button>
      </div>
    </div>

    <div class="section">
      <h3>Project</h3>
      <button id="save-json-btn" style="width:100%;margin-bottom:4px">Save JSON</button>
      <button id="load-json-btn" style="width:100%">Load JSON</button>
      <input id="json-file" type="file" accept=".json" style="display:none">
    </div>
  </div>
</div>

<div id="bottom">
  <div id="timeline-scroll">
    <div id="timeline-inner">
      <canvas id="timeline-canvas"></canvas>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  bpm: 120,
  dots: new Map(),        // Map<beat_32, color> — color captured at placement time
  videoPath: null,        // server-side path after upload
  direction: 'bothdirections',
  barY: 0.98,
  barHeight: 60,
  barOpacity: 35,
  dotColor: { r: 255, g: 182, b: 193, a: 255 },
  dotRadius: 14,
  dotTravel: 3.0,
  endColor: { r: 255, g: 255, b: 255, a: 220 },
  endX: 0.50,
  endRadius: 22,
  outputPath: 'output.mp4',
  beatChanges: [],        // [{beat_32, type}] sorted by beat_32
  fx: {
    speedUp: true,  speedPower: 2.5,
    hitGlow: true,  hitGlowDur: 0.25,
    dotShrink: true, shrinkDur: 0.12,
    dotGlow: true,  dotGlowInt: 0.7,
    echoRing: false, echoRingDur: 0.4,
  },
};

// ─── Pastel palette ───────────────────────────────────────────────────────────
const PALETTE = [
  { name: 'Pink',    r: 255, g: 182, b: 193, a: 255 },
  { name: 'Red',     r: 255, g: 150, b: 150, a: 255 },
  { name: 'Orange',  r: 255, g: 200, b: 150, a: 255 },
  { name: 'Yellow',  r: 255, g: 240, b: 160, a: 255 },
  { name: 'Green',   r: 180, g: 240, b: 180, a: 255 },
  { name: 'Cyan',    r: 160, g: 230, b: 240, a: 255 },
  { name: 'Blue',    r: 160, g: 180, b: 255, a: 255 },
  { name: 'Purple',  r: 210, g: 170, b: 255, a: 255 },
  { name: 'White',   r: 255, g: 255, b: 255, a: 220 },
  { name: 'Gray',    r: 180, g: 180, b: 180, a: 200 },
];

function makePalette(containerId, stateKey) {
  const el = document.getElementById(containerId);
  PALETTE.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'color-option';
    div.style.background = `rgba(${c.r},${c.g},${c.b},${c.a/255})`;
    div.title = c.name;
    div.dataset.idx = i;
    if (JSON.stringify(state[stateKey]) === JSON.stringify({ r: c.r, g: c.g, b: c.b, a: c.a })) div.classList.add('selected');
    div.addEventListener('click', () => {
      state[stateKey] = { r: c.r, g: c.g, b: c.b, a: c.a };
      el.querySelectorAll('.color-option').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      drawOverlay();
    });
    el.appendChild(div);
  });
}

makePalette('dot-color-palette', 'dotColor');
makePalette('end-color-palette', 'endColor');

// ─── Beat change palette ──────────────────────────────────────────────────────
const BEAT_CHANGE_TYPES = [
  { type: 'none',    symbol: '∅', label: 'No Beats',     color: '#cc4444' },
  { type: 'half',    symbol: '½', label: 'Half Beats',   color: '#ccaa44' },
  { type: 'normal',  symbol: '♩', label: 'Normal Beats', color: '#44aa77' },
  { type: 'double',  symbol: '♫', label: 'Double Beats', color: '#4488cc' },
  { type: 'triplet', symbol: '³', label: 'Triplets',     color: '#aa44cc' },
];
const BC_COLORS = Object.fromEntries(BEAT_CHANGE_TYPES.map(t => [t.type, t.color]));
const BC_SYMBOLS = Object.fromEntries(BEAT_CHANGE_TYPES.map(t => [t.type, t.symbol]));

let selectedBeatChangeType = null;

(function buildBeatChangePalette() {
  const el = document.getElementById('beat-change-palette');
  for (const { type, symbol, label, color } of BEAT_CHANGE_TYPES) {
    const btn = document.createElement('button');
    btn.id = 'bc-btn-' + type;
    btn.draggable = true;
    btn.style.cssText = `color:${color};border-color:${color}88;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px`;
    btn.innerHTML = `<span style="font-size:16px;line-height:1">${symbol}</span><span style="font-size:9px">${label}</span>`;
    btn.addEventListener('dragstart', e => e.dataTransfer.setData('beat-change-type', type));
    btn.addEventListener('click', () => {
      selectedBeatChangeType = selectedBeatChangeType === type ? null : type;
      for (const t of BEAT_CHANGE_TYPES)
        document.getElementById('bc-btn-' + t.type).classList.toggle('active', selectedBeatChangeType === t.type);
      document.getElementById('bc-normal-bpm-row').style.display =
        selectedBeatChangeType === 'normal' ? '' : 'none';
      document.getElementById('bc-downbeat-row').style.display =
        selectedBeatChangeType === 'normal' ? '' : 'none';
    });
    el.appendChild(btn);
  }
})();

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    document.getElementById('play-btn').click();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    videoEl.currentTime = Math.max(0, videoEl.currentTime - (e.shiftKey ? 10 : 2));
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + (e.shiftKey ? 10 : 2));
  }
});

// ─── Sidebar controls ─────────────────────────────────────────────────────────
function bindRange(id, valId, stateKey, scale) {
  const el = document.getElementById(id);
  const label = document.getElementById(valId);
  el.addEventListener('input', () => {
    state[stateKey] = parseFloat(el.value);
    if (label) label.textContent = parseFloat(el.value).toFixed(2);
    drawOverlay();
  });
}
function bindNum(id, stateKey) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { state[stateKey] = parseFloat(el.value); drawOverlay(); });
}

bindRange('bar-y', 'bar-y-val', 'barY');
bindRange('bar-opacity', 'bar-opacity-val', 'barOpacity');
bindRange('end-x', 'end-x-val', 'endX');
bindNum('bar-height', 'barHeight');
bindNum('dot-radius', 'dotRadius');
bindNum('dot-travel', 'dotTravel');
bindNum('end-radius', 'endRadius');

// ── Effects bindings ──────────────────────────────────────────────────────
function bindFxCheck(id, key) {
  document.getElementById(id).addEventListener('change', e => { state.fx[key] = e.target.checked; drawOverlay(); });
}
function bindFxSlider(id, valId, key, fmt) {
  const el = document.getElementById(id), lbl = document.getElementById(valId);
  el.addEventListener('input', () => { state.fx[key] = parseFloat(el.value); lbl.textContent = fmt(parseFloat(el.value)); drawOverlay(); });
}
bindFxCheck('fx-speedup', 'speedUp');
bindFxSlider('fx-speedup-power', 'fx-speedup-val', 'speedPower', v => v.toFixed(1));
bindFxCheck('fx-hitglow', 'hitGlow');
bindFxSlider('fx-hitglow-dur', 'fx-hitglow-val', 'hitGlowDur', v => v.toFixed(2) + 's');
bindFxCheck('fx-shrink', 'dotShrink');
bindFxSlider('fx-shrink-dur', 'fx-shrink-val', 'shrinkDur', v => v.toFixed(2) + 's');
bindFxCheck('fx-dotglow', 'dotGlow');
bindFxSlider('fx-dotglow-int', 'fx-dotglow-val', 'dotGlowInt', v => v.toFixed(2));
bindFxCheck('fx-echoring', 'echoRing');
bindFxSlider('fx-echoring-dur', 'fx-echoring-val', 'echoRingDur', v => v.toFixed(2) + 's');

document.getElementById('bpm').addEventListener('input', e => {
  state.bpm = parseFloat(e.target.value) || 120;
  buildTimeline();
  drawOverlay();
});
document.getElementById('output-path').addEventListener('input', e => {
  state.outputPath = e.target.value;
});
document.getElementById('volume').addEventListener('input', e => {
  videoEl.volume = parseFloat(e.target.value);
});

function setDirection(dir) {
  state.direction = dir;
  document.getElementById('dir-ltr').classList.toggle('active', dir === 'lefttoright');
  document.getElementById('dir-rtl').classList.toggle('active', dir === 'righttoleft');
  document.getElementById('dir-both').classList.toggle('active', dir === 'bothdirections');
  drawOverlay();
}
document.getElementById('dir-ltr').addEventListener('click', () => setDirection('lefttoright'));
document.getElementById('dir-rtl').addEventListener('click', () => setDirection('righttoleft'));
document.getElementById('dir-both').addEventListener('click', () => setDirection('bothdirections'));

// ─── Video & Audio loading ────────────────────────────────────────────────────
const videoEl = document.getElementById('video');
videoEl.volume = 0.4;
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d');

async function generateThumbnails(blobUrl, duration) {
  thumbnailBitmaps = [];
  thumbVid.src = blobUrl;
  await new Promise(r => thumbVid.addEventListener('loadedmetadata', r, { once: true }));
  const offscreen = document.createElement('canvas');
  const THUMB_W = Math.round(THUMB_INTERVAL * pxPer32 * state.bpm / 60 * 8);
  offscreen.width = Math.max(THUMB_W, 2);
  offscreen.height = THUMB_H;
  const oc = offscreen.getContext('2d');
  for (let t = 0; t < duration; t += THUMB_INTERVAL) {
    thumbVid.currentTime = t;
    await new Promise(r => thumbVid.addEventListener('seeked', r, { once: true }));
    oc.drawImage(thumbVid, 0, 0, offscreen.width, THUMB_H);
    const bitmap = await createImageBitmap(offscreen);
    thumbnailBitmaps.push({ time: t, bitmap, interval: THUMB_INTERVAL });
    drawTimeline();
  }
}

async function generateWaveform(file) {
  try {
    const arrayBuf = await file.arrayBuffer();
    const actx = new AudioContext();
    const audioBuf = await actx.decodeAudioData(arrayBuf);
    actx.close();
    const src = audioBuf.getChannelData(0);
    const srcRate = audioBuf.sampleRate;
    const duration = audioBuf.duration;
    const total = Math.ceil(duration * WAVE_SPS);
    const srcPerDst = srcRate / WAVE_SPS;
    const samples = new Float32Array(total);
    for (let i = 0; i < total; i++) {
      let max = 0;
      const s0 = Math.floor(i * srcPerDst), s1 = Math.floor((i + 1) * srcPerDst);
      for (let j = s0; j < s1 && j < src.length; j++) {
        const v = Math.abs(src[j]); if (v > max) max = v;
      }
      samples[i] = max;
    }
    waveformData = { samples, sps: WAVE_SPS, duration };
    drawTimeline();
  } catch (err) {
    console.warn('Waveform generation failed:', err);
  }
}

document.getElementById('load-video-btn').addEventListener('click', () => document.getElementById('video-file').click());

let _renderAfterUpload = false;

document.getElementById('video-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const blobUrl = URL.createObjectURL(file);
  videoEl.src = blobUrl;

  setStatus('Uploading ' + file.name + '…');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/upload/video', { method: 'POST', body: fd });
    const data = await res.json();
    state.videoPath = data.path;
    setStatus('Video loaded: ' + file.name);
    if (_renderAfterUpload) { _renderAfterUpload = false; doRender(); }
  } catch (err) {
    setStatus('Upload failed: ' + err);
    _renderAfterUpload = false;
  }

  videoEl.onloadedmetadata = () => {
    resizeOverlay();
    buildTimeline();
    generateThumbnails(blobUrl, videoEl.duration);
    generateWaveform(file);
  };
});

const audioEl = new Audio();
document.getElementById('load-audio-btn').addEventListener('click', () => document.getElementById('audio-file').click());
document.getElementById('audio-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  audioEl.src = URL.createObjectURL(file);
  setStatus('Metro audio loaded: ' + file.name);
});

document.getElementById('play-btn').addEventListener('click', () => {
  if (videoEl.paused) {
    videoEl.play();
    audioEl.currentTime = videoEl.currentTime;
    audioEl.play();
    document.getElementById('play-btn').textContent = '⏸ Pause';
  } else {
    videoEl.pause();
    audioEl.pause();
    document.getElementById('play-btn').textContent = '▶ Play';
  }
});

// videoEl.currentTime quantizes to the video frame rate (~30 fps). Between
// timeupdate events we extrapolate using the wall clock so rAF draws at full
// display rate without stutter or doubled-position artifacts.
let _smoothT = 0, _smoothRef = 0;

function currentVideoTime() {
  if (videoEl.paused) return videoEl.currentTime;
  return _smoothT + (performance.now() - _smoothRef) / 1000;
}

// rAF loop for smooth animation while playing
let rafId = null;
let _lastSeenCurrentTime = -1;

function animLoop(rafTime) {
  // Re-anchor whenever the browser advances currentTime (video frame rate).
  // Only animLoop touches _smoothT/_smoothRef during playback — timeupdate
  // must not reset the anchor or it causes mid-interpolation snapbacks.
  const ct = videoEl.currentTime;
  if (ct !== _lastSeenCurrentTime) {
    _smoothT = ct;
    _smoothRef = rafTime;
    _lastSeenCurrentTime = ct;
  }
  document.getElementById('time-display').textContent = currentVideoTime().toFixed(2);
  drawOverlay();
  updatePlayhead();
  rafId = requestAnimationFrame(animLoop);
}

videoEl.addEventListener('play', () => {
  _smoothT = videoEl.currentTime;
  _smoothRef = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animLoop);
});

videoEl.addEventListener('pause', () => {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  drawOverlay();
  updatePlayhead();
});

videoEl.addEventListener('ended', () => {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
});

// Redraw on seek while paused. During playback animLoop owns all anchoring.
videoEl.addEventListener('timeupdate', () => {
  if (videoEl.paused) {
    _smoothT = videoEl.currentTime;
    _smoothRef = performance.now();
    document.getElementById('time-display').textContent = videoEl.currentTime.toFixed(2);
    drawOverlay();
    updatePlayhead();
  }
});

// ─── Overlay drawing ──────────────────────────────────────────────────────────
function resizeOverlay() {
  const wrap = document.getElementById('preview-wrap');
  const vr = videoEl.getBoundingClientRect();
  overlayCanvas.width = vr.width;
  overlayCanvas.height = vr.height;
  overlayCanvas.style.left = (vr.left - wrap.getBoundingClientRect().left) + 'px';
  overlayCanvas.style.top = (vr.top - wrap.getBoundingClientRect().top) + 'px';
}

function cssColor(c, alpha) {
  const a = alpha !== undefined ? alpha : c.a / 255;
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

function secsTobeat32(t) {
  const tempo = [{ beat_32: 0, bpm: state.bpm }];
  for (const bc of [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32)) {
    if (bc.type === 'normal' && bc.bpm != null) {
      if (bc.beat_32 === 0) { tempo[0].bpm = bc.bpm; }
      else { tempo.push({ beat_32: bc.beat_32, bpm: bc.bpm }); }
    }
  }
  let secs = 0, i = 0;
  while (i + 1 < tempo.length) {
    const segDur = (tempo[i + 1].beat_32 - tempo[i].beat_32) / 8.0 * 60.0 / tempo[i].bpm;
    if (secs + segDur >= t) break;
    secs += segDur;
    i++;
  }
  return tempo[i].beat_32 + (t - secs) * 8.0 * tempo[i].bpm / 60.0;
}

function beat32ToSecs(b32) {
  // Build sorted tempo anchor list from normal beat changes that carry a bpm.
  const tempo = [{ beat_32: 0, bpm: state.bpm }];
  for (const bc of [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32)) {
    if (bc.type === 'normal' && bc.bpm != null) {
      if (bc.beat_32 === 0) { tempo[0].bpm = bc.bpm; }
      else { tempo.push({ beat_32: bc.beat_32, bpm: bc.bpm }); }
    }
  }
  let secs = 0, i = 0;
  while (i + 1 < tempo.length && tempo[i + 1].beat_32 < b32) {
    secs += (tempo[i + 1].beat_32 - tempo[i].beat_32) / 8.0 * 60.0 / tempo[i].bpm;
    i++;
  }
  secs += (b32 - tempo[i].beat_32) / 8.0 * 60.0 / tempo[i].bpm;
  return secs;
}

function drawOverlay() {
  const w = overlayCanvas.width, h = overlayCanvas.height;
  overlayCtx.clearRect(0, 0, w, h);
  if (!w || !h) return;

  const barY = state.barY * h;
  const halfH = state.barHeight / 2;
  const endX = state.endX * w;
  const t = currentVideoTime();
  const travel = state.dotTravel;
  const fx = state.fx;

  // Bar background
  overlayCtx.fillStyle = `rgba(0,0,0,${state.barOpacity / 255})`;
  overlayCtx.fillRect(0, barY - halfH, w, state.barHeight);

  // ── Hit glow behind end circle ───────────────────────────────────────────
  if (fx.hitGlow) {
    let maxGlow = 0;
    for (const b32 of state.dots.keys()) {
      const age = t - beat32ToSecs(b32);
      if (age >= 0 && age < fx.hitGlowDur) {
        const v = 1 - age / fx.hitGlowDur;
        if (v > maxGlow) maxGlow = v;
      }
    }
    if (maxGlow > 0) {
      const ec = state.endColor;
      const outerR = state.endRadius * (1 + maxGlow * 1.6);
      const grad = overlayCtx.createRadialGradient(endX, barY, state.endRadius * 0.4, endX, barY, outerR);
      grad.addColorStop(0, `rgba(${ec.r},${ec.g},${ec.b},${(maxGlow * 0.85).toFixed(3)})`);
      grad.addColorStop(1, `rgba(${ec.r},${ec.g},${ec.b},0)`);
      overlayCtx.beginPath();
      overlayCtx.arc(endX, barY, outerR, 0, Math.PI * 2);
      overlayCtx.fillStyle = grad;
      overlayCtx.fill();
    }
  }

  // ── End circle ring ──────────────────────────────────────────────────────
  const innerR = state.dotRadius * 0.6;
  const ringWidth = Math.max(2, state.endRadius - innerR);
  const ringRadius = (state.endRadius + innerR) / 2;
  overlayCtx.beginPath();
  overlayCtx.arc(endX, barY, ringRadius, 0, Math.PI * 2);
  overlayCtx.strokeStyle = cssColor(state.endColor);
  overlayCtx.lineWidth = ringWidth;
  overlayCtx.stroke();

  // ── Echo rings ───────────────────────────────────────────────────────────
  if (fx.echoRing) {
    for (const [b32, dc] of state.dots) {
      const hitTime = beat32ToSecs(b32);
      const postEffect = t - hitTime;
      if (postEffect < 0 || postEffect >= fx.echoRingDur) continue;
      const p = postEffect / fx.echoRingDur;
      const ringR = state.dotRadius * (1 + 3.5 * p);
      const ringW = Math.max(1, state.dotRadius * 0.35 * (1 - p));
      const alpha = (dc.a / 255) * (1 - p) * 0.85;
      overlayCtx.beginPath();
      overlayCtx.arc(endX, barY, ringR, 0, Math.PI * 2);
      overlayCtx.strokeStyle = `rgba(${dc.r},${dc.g},${dc.b},${alpha.toFixed(3)})`;
      overlayCtx.lineWidth = ringW;
      overlayCtx.stroke();
    }
  }

  // ── Dots ─────────────────────────────────────────────────────────────────
  for (const [b32, dc] of state.dots) {
    const hitTime = beat32ToSecs(b32);
    const startTime = hitTime - travel;
    const postEffect = t - hitTime;
    const inShrink = fx.dotShrink && postEffect >= 0 && postEffect < fx.shrinkDur;
    const inBrief  = !fx.dotShrink && t >= hitTime && t < hitTime + 0.1;
    const inTravel = t >= startTime && !inShrink && t < hitTime;
    if (!inTravel && !inShrink && !inBrief) continue;

    let progress, dotR;
    if (inShrink) {
      progress = 1.0;
      dotR = state.dotRadius * Math.max(0, 1 - postEffect / fx.shrinkDur);
    } else {
      const linear = Math.max(0, Math.min(1, (t - startTime) / travel));
      progress = (fx.speedUp && fx.speedPower > 1) ? Math.pow(linear, fx.speedPower) : linear;
      dotR = state.dotRadius;
    }
    if (dotR <= 0) continue;

    const dotXs = [];
    if (state.direction === 'lefttoright' || state.direction === 'bothdirections')
      dotXs.push(endX * progress);
    if (state.direction === 'righttoleft' || state.direction === 'bothdirections')
      dotXs.push(w + (endX - w) * progress);

    for (const dotX of dotXs) {
      if (fx.dotGlow) {
        const glowR = dotR * (1 + fx.dotGlowInt * 2.5);
        const baseA = dc.a / 255;
        const grad = overlayCtx.createRadialGradient(dotX, barY, 0, dotX, barY, glowR);
        grad.addColorStop(0,            `rgba(${dc.r},${dc.g},${dc.b},${baseA.toFixed(3)})`);
        grad.addColorStop(dotR / glowR, `rgba(${dc.r},${dc.g},${dc.b},${(baseA * fx.dotGlowInt).toFixed(3)})`);
        grad.addColorStop(1,            `rgba(${dc.r},${dc.g},${dc.b},0)`);
        overlayCtx.beginPath();
        overlayCtx.arc(dotX, barY, glowR, 0, Math.PI * 2);
        overlayCtx.fillStyle = grad;
        overlayCtx.fill();
        // solid core on top of the glow, darkened at the rim for contrast
        const coreGrad = overlayCtx.createRadialGradient(dotX, barY, 0, dotX, barY, dotR);
        coreGrad.addColorStop(0, cssColor(dc));
        coreGrad.addColorStop(1, `rgba(${dc.r*.2|0},${dc.g*.2|0},${dc.b*.2|0},${dc.a/255})`);
        overlayCtx.beginPath();
        overlayCtx.arc(dotX, barY, dotR, 0, Math.PI * 2);
        overlayCtx.fillStyle = coreGrad;
        overlayCtx.fill();
      } else {
        const coreGrad = overlayCtx.createRadialGradient(dotX, barY, 0, dotX, barY, dotR);
        coreGrad.addColorStop(0, cssColor(dc));
        coreGrad.addColorStop(1, `rgba(${dc.r*.2|0},${dc.g*.2|0},${dc.b*.2|0},${dc.a/255})`);
        overlayCtx.beginPath();
        overlayCtx.arc(dotX, barY, dotR, 0, Math.PI * 2);
        overlayCtx.fillStyle = coreGrad;
        overlayCtx.fill();
      }
    }
  }
}

window.addEventListener('resize', () => { resizeOverlay(); drawOverlay(); });

// ─── Timeline ─────────────────────────────────────────────────────────────────
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');
const tlInner = document.getElementById('timeline-inner');
let pxPer32 = 14;          // pixels per 32nd-note slot — changes with zoom
let totalBeat32 = 0;
let canvasOffsetPx = 0;    // timeline pixel where the canvas left edge sits

// Timeline layout rows
const THUMB_H = 56, WAVE_H = 40, DOT_H = 64;
const TL_H = THUMB_H + WAVE_H + DOT_H;

let thumbnailBitmaps = [];  // [{time, bitmap, interval}]
let waveformData = null;    // {samples: Float32Array, sps, duration}
const WAVE_SPS = 512;       // waveform samples per second stored
const THUMB_INTERVAL = 2;   // seconds between video thumbnails

// Hidden video element used only for thumbnail extraction
const thumbVid = document.createElement('video');
thumbVid.muted = true;
thumbVid.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none';
document.body.appendChild(thumbVid);

function buildTimeline() {
  const dur = videoEl.duration || 60;
  const beatsPerSec = state.bpm / 60.0;
  totalBeat32 = Math.ceil(dur * beatsPerSec * 8) + 8;
  // Never shrink below what's needed to show all placed dots
  for (const b of state.dots.keys()) if (b + 8 > totalBeat32) totalBeat32 = b + 8;
  // Canvas width above ~32767px causes the browser backing store to silently fail.
  // Instead of reducing pxPer32, we keep user zoom and use a virtual canvas that
  // slides within a full-width inner div, redrawing on scroll.
  const MAX_CANVAS_W = 32766;
  const fullW = totalBeat32 * pxPer32;
  const canvasW = Math.min(fullW, MAX_CANVAS_W);
  tlInner.style.width = fullW + 'px';
  tlInner.style.height = TL_H + 'px';
  tlCanvas.width = canvasW;
  tlCanvas.height = TL_H;
  const scrollEl = document.getElementById('timeline-scroll');
  canvasOffsetPx = Math.min(scrollEl.scrollLeft, Math.max(0, fullW - canvasW));
  tlCanvas.style.left = canvasOffsetPx + 'px';
  drawTimeline();
}

function drawTimeline() {
  const w = tlCanvas.width;
  const off = canvasOffsetPx;   // timeline-px where canvas left edge sits
  const pxPerSec = pxPer32 * state.bpm / 60 * 8;

  // Translate so all coordinates are in full-timeline space; canvas clips the rest.
  tlCtx.save();
  tlCtx.translate(-off, 0);
  tlCtx.clearRect(off, 0, w, TL_H);

  // ── Video thumbnail strip ────────────────────────────────────────────────
  tlCtx.fillStyle = '#0d0d0d';
  tlCtx.fillRect(off, 0, w, THUMB_H);
  for (const {time, bitmap, interval} of thumbnailBitmaps) {
    const x = secsTobeat32(time) * pxPer32;
    const tw = (secsTobeat32(time + interval) - secsTobeat32(time)) * pxPer32;
    if (x > off + w || x + tw < off) continue;
    tlCtx.drawImage(bitmap, x, 0, tw, THUMB_H);
  }

  // ── Waveform strip ───────────────────────────────────────────────────────
  tlCtx.fillStyle = '#111';
  tlCtx.fillRect(off, THUMB_H, w, WAVE_H);
  if (waveformData) {
    const midY = THUMB_H + WAVE_H / 2;
    const half = WAVE_H / 2 - 3;
    tlCtx.strokeStyle = '#3d8c4f';
    tlCtx.lineWidth = 1;
    tlCtx.beginPath();
    for (let px = off; px < off + w; px++) {
      const si = Math.floor(beat32ToSecs(px / pxPer32) * WAVE_SPS);
      const amp = (waveformData.samples[si] || 0) * half;
      tlCtx.moveTo(px + 0.5, midY - amp);
      tlCtx.lineTo(px + 0.5, midY + amp);
    }
    tlCtx.stroke();
  }

  // ── Section dividers ─────────────────────────────────────────────────────
  tlCtx.strokeStyle = '#2a2a2a';
  tlCtx.lineWidth = 1;
  for (const y of [THUMB_H, THUMB_H + WAVE_H]) {
    tlCtx.beginPath(); tlCtx.moveTo(off, y); tlCtx.lineTo(off + w, y); tlCtx.stroke();
  }

  // ── Dot track ────────────────────────────────────────────────────────────
  const dotY = THUMB_H + WAVE_H;
  tlCtx.fillStyle = '#1a1a1a';
  tlCtx.fillRect(off, dotY, w, DOT_H);

  // Build sections once — used for shading, grid lines, and snapping
  {
    const bcs = [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32);
    let secType = 'none', secStart = 0;
    for (const bc of bcs) {
      const x1 = secStart * pxPer32, x2 = bc.beat_32 * pxPer32;
      if (secType === 'none')    { tlCtx.fillStyle = 'rgba(180,40,40,0.18)';  tlCtx.fillRect(x1, dotY, x2 - x1, DOT_H); }
      if (secType === 'triplet') { tlCtx.fillStyle = 'rgba(150,50,220,0.12)'; tlCtx.fillRect(x1, dotY, x2 - x1, DOT_H); }
      secStart = bc.beat_32; secType = bc.type;
    }
    const x1 = secStart * pxPer32;
    const right = off + w;
    if (x1 < right) {
      if (secType === 'none')    { tlCtx.fillStyle = 'rgba(180,40,40,0.18)';  tlCtx.fillRect(x1, dotY, right - x1, DOT_H); }
      if (secType === 'triplet') { tlCtx.fillStyle = 'rgba(150,50,220,0.12)'; tlCtx.fillRect(x1, dotY, right - x1, DOT_H); }
    }
  }

  // Section-aware grid lines
  {
    const bcs = [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32);
    const sections = [];
    let prev = 0, prevType = 'none';
    for (const bc of bcs) { sections.push({ start: prev, end: bc.beat_32, type: prevType }); prev = bc.beat_32; prevType = bc.type; }
    sections.push({ start: prev, end: totalBeat32, type: prevType });

    for (const { start, end, type } of sections) {
      if (type === 'triplet') {
        // 6 triplet-16th slots per beat; bar = 24 ticks, beat = 6 ticks, half-beat = 3 ticks
        const TRIP = 4 / 3;
        // Skip ahead to the first triplet tick visible on the canvas
        const nStart = Math.max(0, Math.floor((off / pxPer32 - start) / TRIP));
        const count = Math.ceil((end - start) / TRIP);
        for (let n = nStart; n < count; n++) {
          const pos = start + n * TRIP;
          if (pos >= end) break;
          const x = pos * pxPer32;
          if (x > off + w) break;
          if      (n % 24 === 0) { tlCtx.strokeStyle = '#888';    tlCtx.lineWidth = 1.5; }
          else if (n %  6 === 0) { tlCtx.strokeStyle = '#555';    tlCtx.lineWidth = 1;   }
          else if (n %  3 === 0) { tlCtx.strokeStyle = '#3a3a3a'; tlCtx.lineWidth = 0.5; }
          else                   { tlCtx.strokeStyle = '#2d2d2d'; tlCtx.lineWidth = 0.5; }
          tlCtx.beginPath(); tlCtx.moveTo(x, dotY); tlCtx.lineTo(x, TL_H); tlCtx.stroke();
        }
      } else {
        // Draw finest lines first, coarsest last so bar/beat lines overwrite subdivisions.
        // All positions are relative to `start` so a fractional downbeat shifts the grid.
        for (const [step, style, lw] of [
          [1, '#2d2d2d', 0.5], [4, '#3a3a3a', 0.5], [8, '#555', 1], [32, '#888', 1.5],
        ]) {
          const firstN = Math.max(0, Math.ceil((off / pxPer32 - start) / step));
          tlCtx.strokeStyle = style; tlCtx.lineWidth = lw; tlCtx.beginPath();
          for (let n = firstN; ; n++) {
            const pos = start + n * step;
            if (pos >= end) break;
            const x = pos * pxPer32;
            if (x > off + w) break;
            tlCtx.moveTo(x, dotY); tlCtx.lineTo(x, TL_H);
          }
          tlCtx.stroke();
        }
      }
    }
  }

  for (const [b32, dc] of state.dots) {
    const x = b32 * pxPer32 + pxPer32 / 2;
    if (x < off || x > off + w) continue;
    tlCtx.fillStyle = cssColor(dc);
    tlCtx.beginPath();
    tlCtx.arc(x, dotY + DOT_H / 2, 5, 0, Math.PI * 2);
    tlCtx.fill();
  }

  // ── Beat change markers ───────────────────────────────────────────────────
  for (const bc of state.beatChanges) {
    const x = bc.beat_32 * pxPer32;
    if (x < off - 100 || x > off + w + 100) continue;
    const color = BC_COLORS[bc.type];
    tlCtx.strokeStyle = color;
    tlCtx.lineWidth = 2;
    tlCtx.beginPath();
    tlCtx.moveTo(x, dotY);
    tlCtx.lineTo(x, TL_H);
    tlCtx.stroke();
    tlCtx.fillStyle = color;
    if (bc.type === 'normal' && bc.bpm != null) {
      tlCtx.font = 'bold 10px monospace';
      tlCtx.fillText(`♩${Math.round(bc.bpm)}`, x + 3, dotY + 13);
    } else {
      tlCtx.font = 'bold 11px monospace';
      tlCtx.fillText(BC_SYMBOLS[bc.type], x + 3, dotY + 13);
    }
  }

  // ── Playhead ─────────────────────────────────────────────────────────────
  if (videoEl.duration) {
    const px = secsTobeat32(currentVideoTime()) * pxPer32;
    tlCtx.strokeStyle = '#ff4444';
    tlCtx.lineWidth = 2;
    tlCtx.beginPath();
    tlCtx.moveTo(px, 0);
    tlCtx.lineTo(px, TL_H);
    tlCtx.stroke();
  }

  tlCtx.restore();
}

function updatePlayhead() {
  const scroll = document.getElementById('timeline-scroll');
  const px = secsTobeat32(currentVideoTime()) * pxPer32;
  if (px < scroll.scrollLeft || px > scroll.scrollLeft + scroll.clientWidth - 60) {
    scroll.scrollLeft = px - scroll.clientWidth / 2;
  }
  drawTimeline();
}

// Snaps a pixel x offset to the appropriate beat_32 position based on section type.
// For sections with a fractional start (downbeat marker), snaps relative to that start
// so dots stay aligned to the section's beat grid.
function snapB32(offsetX) {
  const rawB32 = offsetX / pxPer32;
  const bcs = [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32);
  let secType = 'none', secStart = 0;
  for (const bc of bcs) {
    if (bc.beat_32 > rawB32) break;
    secType = bc.type; secStart = bc.beat_32;
  }
  if (secType === 'triplet') {
    const TRIP = 4 / 3;
    const n = Math.round((rawB32 - secStart) / TRIP);
    return secStart + n * TRIP;
  }
  return secStart + Math.floor(rawB32 - secStart);
}

document.getElementById('bc-downbeat-btn').addEventListener('click', () => {
  const b32 = secsTobeat32(videoEl.currentTime);
  const bpm = parseFloat(document.getElementById('bc-normal-bpm').value) || state.bpm;
  placeBeatChange(b32, 'normal', bpm);
});

// Timeline click/drag to add or remove dots
let tlDragging = false;
let tlAddMode = true;

function tlSeek(offsetX) {
  videoEl.currentTime = beat32ToSecs(offsetX / pxPer32);
}

function placeBeatChange(b32, type, bpm) {
  const idx = state.beatChanges.findIndex(bc => bc.beat_32 === b32);
  if (idx >= 0) state.beatChanges.splice(idx, 1);
  const entry = { beat_32: b32, type };
  if (type === 'normal' && bpm != null) entry.bpm = bpm;
  state.beatChanges.push(entry);
  state.beatChanges.sort((a, b) => a.beat_32 - b.beat_32);
  // Clear dots in the section that now starts at b32, up to the next beat change.
  // Dots placed under a different grid are unreachable by clicking so must be purged.
  const next = state.beatChanges.find(bc => bc.beat_32 > b32);
  const clearEnd = next ? next.beat_32 : Infinity;
  for (const b of state.dots.keys()) {
    if (b >= b32 && b < clearEnd) state.dots.delete(b);
  }
  drawTimeline();
  drawOverlay();
}

tlCanvas.addEventListener('mousedown', e => {
  const tlX = e.offsetX + canvasOffsetPx;
  if (e.offsetY < THUMB_H + WAVE_H) { tlSeek(tlX); return; }
  if (selectedBeatChangeType !== null) {
    const b32 = Math.floor(tlX / pxPer32);
    const bpm = selectedBeatChangeType === 'normal'
      ? (parseFloat(document.getElementById('bc-normal-bpm').value) || state.bpm)
      : null;
    placeBeatChange(b32, selectedBeatChangeType, bpm);
    return;
  }
  const b32 = snapB32(tlX);
  tlDragging = true;
  tlAddMode = !state.dots.has(b32);
  toggleDot(b32, tlAddMode);
});
tlCanvas.addEventListener('mousemove', e => {
  if (!tlDragging) return;
  toggleDot(snapB32(e.offsetX + canvasOffsetPx), tlAddMode);
});
window.addEventListener('mouseup', () => { tlDragging = false; });

// Right-click on dot track → remove beat change marker; elsewhere → seek
tlCanvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const tlX = e.offsetX + canvasOffsetPx;
  if (e.offsetY >= THUMB_H + WAVE_H) {
    const rawB32 = tlX / pxPer32;
    const idx = state.beatChanges.findIndex(bc => Math.abs(bc.beat_32 - rawB32) < 0.5);
    if (idx >= 0) { state.beatChanges.splice(idx, 1); drawTimeline(); return; }
  }
  tlSeek(tlX);
});

// Drag beat change type from palette onto dot track
tlCanvas.addEventListener('dragover', e => {
  if (e.offsetY >= THUMB_H + WAVE_H) e.preventDefault();
});
tlCanvas.addEventListener('drop', e => {
  e.preventDefault();
  if (e.offsetY < THUMB_H + WAVE_H) return;
  const type = e.dataTransfer.getData('beat-change-type');
  if (!type) return;
  const bpm = type === 'normal'
    ? (parseFloat(document.getElementById('bc-normal-bpm').value) || state.bpm)
    : null;
  placeBeatChange(Math.floor((e.offsetX + canvasOffsetPx) / pxPer32), type, bpm);
});

// Scroll wheel → zoom, anchored to cursor position
document.getElementById('timeline-scroll').addEventListener('wheel', e => {
  e.preventDefault();
  const scrollEl = document.getElementById('timeline-scroll');
  const rect = scrollEl.getBoundingClientRect();
  const cursorCanvasX = (e.clientX - rect.left) + scrollEl.scrollLeft;
  const pxPerSec = pxPer32 * state.bpm / 60 * 8;
  const timeAtCursor = cursorCanvasX / pxPerSec;

  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  pxPer32 = Math.max(3, Math.min(120, pxPer32 * factor));

  buildTimeline();

  const newPxPerSec = pxPer32 * state.bpm / 60 * 8;
  scrollEl.scrollLeft = timeAtCursor * newPxPerSec - (e.clientX - rect.left);
}, { passive: false });

// Pan (scroll) → slide the virtual canvas window and redraw
document.getElementById('timeline-scroll').addEventListener('scroll', () => {
  const scrollEl = document.getElementById('timeline-scroll');
  const fullW = totalBeat32 * pxPer32;
  const maxOffset = Math.max(0, fullW - tlCanvas.width);
  canvasOffsetPx = Math.min(scrollEl.scrollLeft, maxOffset);
  tlCanvas.style.left = canvasOffsetPx + 'px';
  drawTimeline();
});

function toggleDot(b32, add) {
  if (b32 < 0 || b32 >= totalBeat32) return;
  if (add) state.dots.set(b32, { ...state.dotColor });
  else state.dots.delete(b32);
  drawTimeline();
  drawOverlay();
}

// ─── Fill beats button ────────────────────────────────────────────────────────
document.getElementById('fill-beats-btn').addEventListener('click', () => {
  state.dots.clear();
  const STEPS = { none: null, half: 16, normal: 8, double: 4 };
  const changes = [...state.beatChanges].sort((a, b) => a.beat_32 - b.beat_32);

  // Build sections: [start, end) with a type
  const sections = [];
  let prev = 0, prevType = 'none';
  for (const bc of changes) {
    sections.push({ start: prev, end: bc.beat_32, type: prevType });
    prev = bc.beat_32; prevType = bc.type;
  }
  sections.push({ start: prev, end: totalBeat32, type: prevType });

  for (const { start, end, type } of sections) {
    if (type === 'triplet') {
      // Fill every triplet-8th (3 per beat). Use index multiplication (not +=)
      // so stored floats match what snapB32 produces: start + n*2*(4/3).
      const TRIP = 4 / 3;
      for (let n = 0; ; n++) {
        const pos = start + n * 2 * TRIP;
        if (pos >= end) break;
        state.dots.set(pos, { ...state.dotColor });
      }
    } else {
      const step = STEPS[type];
      if (step === null) continue;
      for (let i = start; i < end; i += step) state.dots.set(i, { ...state.dotColor });
    }
  }
  drawTimeline();
  drawOverlay();
});

document.getElementById('clear-dots-btn').addEventListener('click', () => {
  state.dots.clear();
  drawTimeline();
  drawOverlay();
});

// ─── JSON save/load ───────────────────────────────────────────────────────────
document.getElementById('save-json-btn').addEventListener('click', () => {
  const project = buildProject();
  const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'project.json';
  a.click();
});

document.getElementById('load-json-btn').addEventListener('click', () => document.getElementById('json-file').click());
document.getElementById('json-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      applyProject(p);
      setStatus('Project loaded.');
    } catch (err) {
      setStatus('Error loading JSON: ' + err);
    }
  };
  reader.readAsText(file);
});

function buildProject() {
  return {
    bpm: state.bpm,
    video_path: state.videoPath,
    bar: {
      bar_y: state.barY,
      bar_height: state.barHeight,
      bar_opacity: state.barOpacity,
      dot_color: state.dotColor,
      end_circle_color: state.endColor,
      end_circle_x: state.endX,
      direction: state.direction,
      dot_radius: state.dotRadius,
      end_circle_radius: state.endRadius,
      dot_travel_seconds: state.dotTravel,
    },
    fx: { ...state.fx },
    dots: [...state.dots.keys()].sort((a, b) => a - b).map(b32 => ({ beat_32: b32, color: state.dots.get(b32) })),
    beat_changes: state.beatChanges.map(bc => {
      const entry = { beat_32: bc.beat_32, type: bc.type };
      if (bc.type === 'normal' && bc.bpm != null) entry.bpm = bc.bpm;
      return entry;
    }),
    output: state.outputPath,
  };
}

function applyProject(p) {
  if (p.video_path) state.videoPath = p.video_path;
  state.bpm = p.bpm ?? 120;
  document.getElementById('bpm').value = state.bpm;
  if (p.bar) {
    state.barY = p.bar.bar_y ?? 0.98;
    state.barHeight = p.bar.bar_height ?? 60;
    state.barOpacity = p.bar.bar_opacity ?? 35;
    state.dotColor = p.bar.dot_color ?? state.dotColor;
    state.endColor = p.bar.end_circle_color ?? state.endColor;
    state.endX = p.bar.end_circle_x ?? 0.5;
    state.direction = p.bar.direction ?? 'bothdirections';
    setDirection(state.direction);
    state.dotRadius = p.bar.dot_radius ?? 14;
    state.endRadius = p.bar.end_circle_radius ?? 22;
    state.dotTravel = p.bar.dot_travel_seconds ?? 3;
    // sync sliders
    document.getElementById('bar-y').value = state.barY;
    document.getElementById('bar-y-val').textContent = state.barY.toFixed(2);
    document.getElementById('bar-height').value = state.barHeight;
    document.getElementById('bar-opacity').value = state.barOpacity;
    document.getElementById('bar-opacity-val').textContent = state.barOpacity;
    document.getElementById('end-x').value = state.endX;
    document.getElementById('end-x-val').textContent = state.endX.toFixed(2);
    document.getElementById('end-radius').value = state.endRadius;
    document.getElementById('dot-radius').value = state.dotRadius;
    document.getElementById('dot-travel').value = state.dotTravel;
  }
  if (p.fx) {
    Object.assign(state.fx, p.fx);
    const f = state.fx;
    document.getElementById('fx-speedup').checked = f.speedUp;
    document.getElementById('fx-speedup-power').value = f.speedPower;
    document.getElementById('fx-speedup-val').textContent = f.speedPower.toFixed(1);
    document.getElementById('fx-hitglow').checked = f.hitGlow;
    document.getElementById('fx-hitglow-dur').value = f.hitGlowDur;
    document.getElementById('fx-hitglow-val').textContent = f.hitGlowDur.toFixed(2) + 's';
    document.getElementById('fx-shrink').checked = f.dotShrink;
    document.getElementById('fx-shrink-dur').value = f.shrinkDur;
    document.getElementById('fx-shrink-val').textContent = f.shrinkDur.toFixed(2) + 's';
    document.getElementById('fx-dotglow').checked = f.dotGlow;
    document.getElementById('fx-dotglow-int').value = f.dotGlowInt;
    document.getElementById('fx-dotglow-val').textContent = f.dotGlowInt.toFixed(2);
    document.getElementById('fx-echoring').checked = f.echoRing ?? false;
    document.getElementById('fx-echoring-dur').value = f.echoRingDur ?? 0.4;
    document.getElementById('fx-echoring-val').textContent = (f.echoRingDur ?? 0.4).toFixed(2) + 's';
  }
  state.dots.clear();
  (p.dots ?? []).forEach(d => state.dots.set(d.beat_32, d.color ?? { ...state.dotColor }));
  state.beatChanges = (p.beat_changes ?? []).map(bc => {
    const entry = { beat_32: bc.beat_32, type: bc.type };
    if (bc.type === 'normal' && bc.bpm != null) entry.bpm = bc.bpm;
    return entry;
  });
  if (p.output) {
    state.outputPath = p.output;
    document.getElementById('output-path').value = p.output;
  }
  buildTimeline();
  drawOverlay();
}

// ─── Render ───────────────────────────────────────────────────────────────────
async function doRender() {
  setStatus('Rendering…');
  const overlayOnly = document.getElementById('overlay-only-cb').checked;
  const project = buildProject();
  const res = await fetch('/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ video_path: state.videoPath, project, overlay_only: overlayOnly }),
  });
  if (res.ok) {
    setStatus('Render complete: ' + state.outputPath);
  } else {
    const txt = await res.text();
    setStatus('Render failed: ' + txt);
  }
}

document.getElementById('render-btn').addEventListener('click', () => {
  if (!state.videoPath) {
    _renderAfterUpload = true;
    setStatus('Select your video file to begin rendering…');
    document.getElementById('video-file').click();
    return;
  }
  doRender();
});

function setStatus(s) { document.getElementById('status').textContent = s; }

// ─── Song identification ───────────────────────────────────────────────────────
document.getElementById('id-song-btn').addEventListener('click', async () => {
  if (!state.videoPath) { setStatus('Load a video first.'); return; }
  setStatus('Identifying song…');
  try {
    const res = await fetch('/identify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_path: state.videoPath, timestamp: videoEl.currentTime }),
    });
    if (!res.ok) {
      const msg = await res.text().catch(() => res.statusText);
      setStatus('ID failed: ' + msg);
      return;
    }
    const data = await res.json();
    if (data.result) {
      setStatus(`${data.result.artist} — ${data.result.title}`);
    } else {
      setStatus('Song not recognized.');
    }
  } catch (err) {
    setStatus('ID failed: ' + err);
  }
});

buildTimeline();
</script>
